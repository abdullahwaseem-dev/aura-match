# Keeps the Render free-tier backend from spinning down after 15 minutes
# of no traffic. This MUST run somewhere other than Render itself — a
# sleeping instance can't wake itself up, so GitHub's servers do the
# knocking instead.

name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes — comfortably inside Render's 15-minute idle window
  workflow_dispatch: # lets you trigger it manually from the Actions tab to test it

env:
  RENDER_URL: https://aura-match.onrender.com/api/health

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging $RENDER_URL"
          curl -sf --max-time 30 "$RENDER_URL" || echo "Ping failed — service may be cold-starting, next run will confirm."
